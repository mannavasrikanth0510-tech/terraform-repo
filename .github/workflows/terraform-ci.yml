name: Terraform CI (All Dev Stacks)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VERSION: "1.8.5"

jobs:
  terraform-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Detect changed stacks
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # changed deployable stacks from live/dev/*
          mapfile -t STACKS < <(
            git diff --name-only "$BASE" "$HEAD" \
            | awk -F/ '/^infrastructure-live\/dev\/[^\/]+\// {print $1"/"$2"/"$3}' \
            | sort -u
          )

          # if module changed => run all dev stacks
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^infrastructure-modules/'; then
            mapfile -t STACKS < <(find infrastructure-live/dev -mindepth 1 -maxdepth 1 -type d | sort -u)
          fi

          if [ ${#STACKS[@]} -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          printf "%s\n" "${STACKS[@]}" > stacks.txt
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Terraform CI for each stack
        if: steps.detect.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r DIR; do
            [ -z "$DIR" ] && continue
            echo "===================="
            echo "Running in: $DIR"
            echo "===================="

            terraform -chdir="$DIR" init -reconfigure \
              -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
              -backend-config="key=${DIR}/terraform.tfstate" \
              -backend-config="region=${{ vars.AWS_REGION }}" \
              -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
              -backend-config="encrypt=true"

            terraform -chdir="$DIR" fmt -recursive -check -diff
            terraform -chdir="$DIR" validate
            terraform -chdir="$DIR" plan -out=plan.tfplan -var="bucket_name=${{ secrets.BUCKET_NAME }}"
          done < stacks.txt